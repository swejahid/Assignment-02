<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocktail DB - SDP Assignment 02</title>
    <link rel="stylesheet" href="style.css">
<base target="_blank">
</head>
<body>
    <div class="header">
        <h1>🍹 Cocktail DB Explorer</h1>
        <p>Discover your favorite cocktails</p>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search for a cocktail (e.g., Margarita, Mojito)...">
        <button id="searchBtn">🔍 Search</button>
    </div>

    <div class="main-layout">
        <div class="drinks-section">
            <h2 class="section-title">🍸 Drinks</h2>
            <div id="drinksContainer" class="drinks-grid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading cocktails...</p>
                </div>
            </div>
        </div>

        <div class="group-section">
            <div class="group-panel">
                <h2 class="section-title">📋 My Group</h2>
                <div class="group-count">Drinks in group: <span id="groupCount">0</span> / 7</div>
                <div id="groupContainer">
                    <div class="empty-group">No drinks added yet.<br>Click "Add to Group" to add drinks!</div>
                </div>
            </div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <img id="modalImage" src="" alt="">
                <button class="modal-close" id="modalCloseBtn">&times;</button>
            </div>
            <div class="modal-body">
                <h2 id="modalTitle" class="modal-title"></h2>
                <p id="modalCategory" class="modal-category"></p>
                <div id="modalDetails"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
